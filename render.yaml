# Render Blueprint — deploy from repo root: https://render.com/deploy
# Launch checklist: PRODUCTION_LAUNCH.md

services:
  - type: web
    name: givefund-api
    runtime: python
    plan: starter
    rootDir: backend
    buildCommand: >-
      pip install -r requirements.txt &&
      pip install -r ../scraper/requirements.txt &&
      playwright install chromium
    startCommand: bash ../scripts/start_prod.sh
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DB_PATH
        value: /var/data/givefund.db
      - key: DB_DOWNLOAD_URL
        value: https://github.com/ammar-adam/givefund/releases/download/db-latest/givefund.db
      - key: SCRAPE_ON_START
        value: "false"
      - key: LIVE_SCRAPE
        value: "true"
      - key: SCRAPE_INTERVAL
        value: "1800"
      - key: MIN_CAMPAIGNS
        value: "10000"
      - key: GFM_ALGOLIA_ONLY
        value: "true"
      - key: GFM_MAX_ALGOLIA_PAGES
        value: "100"
      - key: SCALE_TARGET
        value: "10000"
      # --- Set in Render dashboard (sync: false = not overwritten on deploy) ---
      - key: GIVEFUND_FRONTEND_URL
        sync: false
      - key: GFM_ALGOLIA_APP_ID
        sync: false
      - key: GFM_ALGOLIA_API_KEY
        sync: false
      - key: GLOBALGIVING_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
    disk:
      name: givefund-data
      mountPath: /var/data
      sizeGB: 1
