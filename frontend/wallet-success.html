<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card saved — GiveFund</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <script src="config.js"></script>
  <style>
    body {
      font-family: Inter, system-ui, sans-serif;
      max-width: 480px;
      margin: 80px auto;
      padding: 0 24px;
      line-height: 1.6;
      color: #121212;
    }
    a { color: #c45c4a; }
    .ok { color: #166534; background: #dcfce7; padding: 12px; border-radius: 8px; }
    .err { color: #991b1b; background: #fee2e2; padding: 12px; border-radius: 8px; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <h1>Card saved</h1>
  <p id="loading">Confirming with Stripe…</p>
  <div id="done" class="hidden">
    <p class="ok">Your payment method is saved. Use the <strong>same email</strong> when you give — Stripe Link may autofill on supported checkouts.</p>
    <p>GiveFund still sends you to each campaign's own platform. We never charge or hold campaign donations.</p>
    <p><a href="index.html#campaigns">Back to campaigns</a> · <a href="wallet.html">Wallet settings</a></p>
  </div>
  <p id="err" class="err hidden"></p>
  <script>
    const API = window.GIVEFUND_API_URL || "http://localhost:8000";
    const TOKEN_KEY = "givefund_wallet_token";
    const params = new URLSearchParams(location.search);
    const sessionId = params.get("session_id");
    const sessionToken = sessionStorage.getItem(TOKEN_KEY);

    async function complete() {
      if (!sessionId) {
        document.getElementById("loading").classList.add("hidden");
        document.getElementById("done").classList.remove("hidden");
        return;
      }
      if (!sessionToken) {
        document.getElementById("loading").classList.add("hidden");
        const err = document.getElementById("err");
        err.textContent = "Session expired. Please return to the wallet page and sign in again.";
        err.classList.remove("hidden");
        return;
      }
      try {
        const res = await fetch(`${API}/wallet/complete`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${sessionToken}`,
          },
          body: JSON.stringify({ session_id: sessionId }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || "Could not confirm card save");
        document.getElementById("loading").classList.add("hidden");
        document.getElementById("done").classList.remove("hidden");
      } catch (e) {
        document.getElementById("loading").classList.add("hidden");
        const err = document.getElementById("err");
        err.textContent = e.message || "Something went wrong.";
        err.classList.remove("hidden");
      }
    }
    complete();
  </script>
</body>
</html>
