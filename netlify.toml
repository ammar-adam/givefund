[build]
  base = "frontend"
  publish = "."
  command = "node -e \"const u=process.env.GIVEFUND_API_URL||'http://localhost:8000'; require('fs').writeFileSync('config.js', 'window.GIVEFUND_API_URL = \\\"'+u+'\\\";\\n')\""

[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
