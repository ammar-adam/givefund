services:
  - type: web
    name: givefund-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DB_PATH
        value: /var/data/givefund.db
      - key: PORT
        fromService:
          type: web
          name: givefund-api
          property: port
    disk:
      name: givefund-data
      mountPath: /var/data
      sizeGB: 1
