name: Live Scrape

on:
  schedule:
    # Incremental: all platforms via live_runner (~hourly)
    - cron: "15 * * * *"
    # Full rebuild: GoFundMe Algolia scale + all platforms (daily)
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "incremental (live_runner) or full (scale_ingest)"
        required: false
        default: incremental
        type: choice
        options:
          - incremental
          - full

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r scraper/requirements.txt
          pip install -r backend/requirements.txt
          playwright install chromium --with-deps

      - name: Ingest campaigns
        env:
          DB_PATH: ${{ github.workspace }}/givefund.db
          GFM_ALGOLIA_APP_ID: ${{ secrets.GFM_ALGOLIA_APP_ID }}
          GFM_ALGOLIA_API_KEY: ${{ secrets.GFM_ALGOLIA_API_KEY }}
          GFM_ALGOLIA_ONLY: "true"
          GFM_MAX_ALGOLIA_PAGES: "60"
          GLOBALGIVING_API_KEY: ${{ secrets.GLOBALGIVING_API_KEY }}
          RUN_MODE: ${{ github.event.inputs.mode || (github.event.schedule == '0 6 * * *' && 'full') || 'incremental' }}
        run: |
          echo "Run mode: $RUN_MODE"
          cd scraper
          if [ "$RUN_MODE" = "full" ]; then
            python scale_ingest.py --target 10000 --parallel 6
          else
            python live_runner.py --once --parallel 6
          fi

      - name: Report counts
        run: python scripts/publish_db_release.py
        env:
          DB_PATH: ${{ github.workspace }}/givefund.db

      - name: Publish database to GitHub Release (Render DB_DOWNLOAD_URL)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view db-latest 2>/dev/null || gh release create db-latest \
            --title "GiveFund campaign database" \
            --notes "Automated snapshot from Live Scrape workflow. Set Render DB_DOWNLOAD_URL to this release asset."
          gh release upload db-latest givefund.db db-manifest.json --clobber

      - name: Upload database artifact
        uses: actions/upload-artifact@v4
        with:
          name: givefund-db
          path: givefund.db
          retention-days: 14

      - name: Trigger Render deploy (optional)
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        if: env.RENDER_DEPLOY_HOOK_URL != ''
        run: curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"

      - name: Smoke test API
        run: |
          cd backend
          DB_PATH=${{ github.workspace }}/givefund.db uvicorn main:app --host 127.0.0.1 --port 8765 &
          sleep 4
          curl -sf http://127.0.0.1:8765/health
          curl -sf http://127.0.0.1:8765/ingest/status
          curl -sf http://127.0.0.1:8765/wallet/config
          curl -sf "http://127.0.0.1:8765/campaigns?page_size=1" | grep -q campaigns
