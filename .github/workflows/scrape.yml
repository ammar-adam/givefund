name: Live Scrape

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r scraper/requirements.txt
          pip install -r backend/requirements.txt
          playwright install chromium --with-deps

      - name: Run live ingest (all platforms)
        run: cd scraper && python live_runner.py --once --parallel 6
        env:
          DB_PATH: ${{ github.workspace }}/givefund.db
          GFM_ALGOLIA_APP_ID: ${{ secrets.GFM_ALGOLIA_APP_ID }}
          GFM_ALGOLIA_API_KEY: ${{ secrets.GFM_ALGOLIA_API_KEY }}
          GFM_ALGOLIA_ONLY: "true"
          GFM_MAX_ALGOLIA_PAGES: "60"
          GLOBALGIVING_API_KEY: ${{ secrets.GLOBALGIVING_API_KEY }}

      - name: Report counts
        run: sqlite3 givefund.db "SELECT platform, COUNT(*) FROM campaigns GROUP BY platform ORDER BY 2 DESC;"

      - name: Upload database artifact
        uses: actions/upload-artifact@v4
        with:
          name: givefund-db
          path: givefund.db
          retention-days: 14

      - name: Smoke test API
        run: |
          cd backend
          DB_PATH=${{ github.workspace }}/givefund.db uvicorn main:app --host 127.0.0.1 --port 8765 &
          sleep 4
          curl -sf http://127.0.0.1:8765/health
          curl -sf http://127.0.0.1:8765/ingest/status
          curl -sf "http://127.0.0.1:8765/campaigns?page_size=1" | grep -q campaigns
