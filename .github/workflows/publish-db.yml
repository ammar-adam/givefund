name: Publish Database

on:
  workflow_run:
    workflows: ["Daily Scrape"]
    types: [completed]

jobs:
  publish:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download scraped database
        uses: actions/download-artifact@v4
        with:
          name: givefund-db
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
          path: .

      - name: Publish to data branch
        run: |
          sqlite3 givefund.db "SELECT platform, COUNT(*) FROM campaigns GROUP BY platform;"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B data
          mkdir -p data
          cp givefund.db data/givefund.db
          git add data/givefund.db
          git diff --staged --quiet || git commit -m "data: update givefund.db from daily scrape"
          git push origin data --force
